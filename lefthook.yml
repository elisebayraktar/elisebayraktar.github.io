commit-msg:
  jobs:
    - run: npx --no -- commitlint --edit
      name: Commit Lint

pre-commit:
  parallel: true
  jobs:
    - run: pnpm dlx oxlint {staged_files} --fix
      name: Lint
      glob:
        - '*.js'
        - '*.jsx'
        - '*.ts'
        - '*.tsx'
        - '*.json'
        - '*.jsonc'
        - '*.css'
      stage_fixed: true
    - run: pnpm dlx prettier --write {staged_files}
      name: Format
      glob:
        - '*.js'
        - '*.jsx'
        - '*.ts'
        - '*.tsx'
        - '*.json'
        - '*.jsonc'
        - '*.css'
      stage_fixed: true
